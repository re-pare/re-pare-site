# Netlify configuration for RE:PARE site

[build]
# No build command needed - static site
command = "echo 'Static site'"
publish = "."

# Redirect rules
[[redirects]]
from = "/admin/*"
to = "/admin/index.html"
status = 200

# Clean URLs - remove .html extensions (optional)
[[redirects]]
from = "/repare-blog"
to = "/repare-blog.html"
status = 200

[[redirects]]
from = "/repare-catalogue"
to = "/repare-catalogue.html"
status = 200

[[redirects]]
from = "/repare-product"
to = "/repare-product.html"
status = 200

# Security headers
[[headers]]
for = "/*"
[headers.values]
  Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
  X-Content-Type-Options = "nosniff"
  X-Frame-Options = "SAMEORIGIN"
  X-XSS-Protection = "1; mode=block"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache policy
[[headers]]
for = "/*.html"
[headers.values]
  Cache-Control = "public, max-age=3600"

[[headers]]
for = "/images/uploads/*"
[headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.js"
[headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.css"
[headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

# Content policy
[[headers]]
for = "/*"
[headers.values]
  Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdn.jsdelivr.net https://identity.netlify.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; media-src 'self' https:; connect-src 'self' https:; frame-src 'self' https://identity.netlify.com; frame-ancestors 'none';"
